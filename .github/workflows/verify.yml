# Deterministic verification gate (mandate S1 / Article I). Runs on every push and PR.
# It VERIFIES the site; deploy.yml is what publishes it (Pages from GitHub Actions), gated on
# this same suite. Third-party actions are SHA-pinned (supply-chain, C-26); harness deps install
# from the committed lockfile with `npm ci --ignore-scripts` (C-03). See DR-006.
name: verify
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
permissions:
  contents: read
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install harness deps (CI-only, pinned; no lifecycle scripts)
        working-directory: verify
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Verification suite
        working-directory: verify
        run: node run.js
      - name: Mutation testing (the suite must be able to fail)
        working-directory: verify
        run: node mutation.js
      - name: Policy gate (fail-closed)
        working-directory: verify
        run: node gate.js

  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install harness deps (pinned; no lifecycle scripts)
        working-directory: verify
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Install the Chromium the acceptance suite drives
        working-directory: verify
        run: npx --no-install playwright install --with-deps chromium
      - name: Frozen acceptance suite (parity contract) against the current site
        run: node acceptance/run.js
