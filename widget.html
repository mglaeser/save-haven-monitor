<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="content-type" content="text/html; charset=utf-8">
<!-- Lay out at the widget's own point size (168) so WidgetWeb does NOT scale the page down —
     elements render at their authored size instead of becoming tiny. -->
<meta name="viewport" content="width=168, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- JsWidget (WidgetWeb) mandatory title -->
<meta name="js-widget-title" content="AI Bubble Monitor">
<title>AI Bubble Monitor — JS-Widget</title>
<style type="text/css">
  :root{
    --bg:#0E1526; --text:#EDE8DC; --dim:#C7CBD6; --muted:#9AA3B5; --faint:#78829a;
    --gold:#E0B458; --line:rgba(237,232,220,0.09); --serif:Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg)}
  body{color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased}
  /* Fixed 168x168 box == a small 1:1 widget. Content is authored at this size (no downscaling), and
     clipped to the box so nothing spills. Gauge-dominant: score+band big, then F&G, then a small
     one-line stats row. */
  .wrap{position:relative;width:168px;height:168px;overflow:hidden;margin:0 auto;padding:9px 11px 8px;
    display:flex;flex-direction:column;align-items:center;justify-content:space-between}
  .glow{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(64% 46% at 50% 33%,rgba(224,180,88,0.15),rgba(224,180,88,0.04) 55%,transparent 78%)}
  .gaugeBox{width:120px;position:relative;z-index:1}
  .gaugeBox svg{display:block;width:100%;height:auto}
  .fg{width:100%;position:relative;z-index:1}
  .fg .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .fg .lab{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
  .fg .val{font-family:var(--serif);font-size:13px;font-variant-numeric:tabular-nums}
  /* flipped: green left -> red right, matching the regime gauge */
  .fg .bar{position:relative;height:6px;border-radius:999px;
    background:linear-gradient(90deg,#5AA9A3,#7fbf94,#9AA3B5,#C0564A,#E05252)}
  .fg .mk{position:absolute;top:-3px;width:2px;height:12px;border-radius:2px;background:var(--text);
    box-shadow:0 0 0 2px var(--bg);transform:translateX(-50%)}
  .stats{font-size:9.5px;color:var(--dim);font-variant-numeric:tabular-nums;text-align:center;
    line-height:1.3;white-space:nowrap;position:relative;z-index:1}
  .stats .k{color:var(--muted)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="glow"></div>
    <div class="gaugeBox"><svg id="gauge" viewBox="0 8 200 150" aria-label="regime gauge"></svg></div>
    <div class="fg" id="fgblock">
      <div class="head"><span class="lab">Fear &amp; Greed</span><span class="val" id="fgval">—</span></div>
      <div class="bar"><span class="mk" id="fgmk"></span></div>
    </div>
    <div class="stats" id="stats"></div>
  </div>

<script type="text/javascript">
/* ============ WidgetWeb JS-Widget: AI Bubble Monitor (served from GitHub Pages) ============
   Self-contained, no external assets (30MB widget budget), STATELESS (no cookies / no local store).
   Authored at the widget's own 168pt box (viewport width=168) so the page is NOT scaled down — the
   gauge/score stay large and the stats line stays legible. Gated like the dashboard:
   ?status-api=<key> constructs the API base as a subdomain of the widget's own host (KEY_RE-
   whitelisted; no host/domain literal). No valid key -> embedded sample. */

function __wweb2JsWidgetTitle(){ return "AI Bubble Monitor"; }
function __wweb2Log(m){ /* Developer-mode log hook */ }

/* ---- gating (mirrors src/bubblegauge.tsx resolveActivation) ---- */
const KEY_RE = /^[a-z0-9-]{1,32}$/;               // strict whitelist — no dots, no full URLs
var DEMO_KEYS = { demo: true, fixture: true };
function resolveBase(){
  var url; try { url = new URL(window.location.href); } catch (e) { return { live: false }; }
  var key = url.searchParams.get("status-api");
  if (!key || !KEY_RE.test(key)) return { live: false };        // no/invalid key -> sample
  if (DEMO_KEYS[key]) return { live: false, demo: true };       // offline preview
  var host = window.location.hostname, labels = host.split(".");
  var parent = labels.length > 2 ? labels.slice(1).join(".") : host;
  return { live: true, base: "https://" + key + "." + parent }; // subdomain-of-parent only
}
var ACT = resolveBase();
var API_BASE = ACT.base || null;
var DEMO = !!ACT.demo;

/* ---- tokens ---- */
var BAND={hold:{label:"HOLD",color:"#5B8DEF"},trim:{label:"TRIM",color:"#E0B458"},"de-risk":{label:"DE-RISK",color:"#E05252"}};
function bandOf(b){return BAND[b]||BAND.hold;}
var FG_COLORS={"extreme fear":"#E05252","fear":"#C0564A","neutral":"#9AA3B5","greed":"#7fbf94","extreme greed":"#5AA9A3"};

var SAMPLE={score:40,band:"hold",fg:{value:46,rating:"neutral"},cape:42.2,goldTtm:22.9,btcDd:-44,asOf:"sample"};
var DATA=SAMPLE;

/* ---- radial gauge geometry (same construction as the app splash) ---- */
var GX=100,GY=96,GR=74,A0=135,SW=270;
function pol(r,deg){var a=deg*Math.PI/180;return [GX+r*Math.cos(a),GY+r*Math.sin(a)];}
function garc(t0,t1,r){r=r||GR;var p0=pol(r,A0+t0*SW),p1=pol(r,A0+t1*SW);
  var large=(t1-t0)*SW>180?1:0;
  return "M"+p0[0].toFixed(1)+" "+p0[1].toFixed(1)+" A"+r+" "+r+" 0 "+large+" 1 "+p1[0].toFixed(1)+" "+p1[1].toFixed(1);}
function drawGauge(score,band){
  var b=bandOf(band),s=Math.max(0,Math.min(100,score)),t=s/100,ang=A0+t*SW;
  var mk=pol(GR,ang),mkI=pol(GR-12,ang),mkO=pol(GR+14,ang);
  // Only fixed-palette colors, computed coords and numbers reach innerHTML — never an API string.
  var svg=""
    +'<path d="'+garc(0,1)+'" fill="none" stroke="rgba(237,232,220,0.07)" stroke-width="12" stroke-linecap="round"/>'
    +'<path d="'+garc(0,0.45)+'" fill="none" stroke="#5B8DEF" stroke-opacity="0.30" stroke-width="12" stroke-linecap="round"/>'
    +'<path d="'+garc(0.45,0.60)+'" fill="none" stroke="#E0B458" stroke-opacity="0.32" stroke-width="12"/>'
    +'<path d="'+garc(0.60,1)+'" fill="none" stroke="#E05252" stroke-opacity="0.30" stroke-width="12" stroke-linecap="round"/>'
    +'<path d="'+garc(0,t)+'" fill="none" stroke="'+b.color+'" stroke-width="6" stroke-linecap="round"/>'
    +'<line x1="'+mkI[0].toFixed(1)+'" y1="'+mkI[1].toFixed(1)+'" x2="'+mkO[0].toFixed(1)+'" y2="'+mkO[1].toFixed(1)+'" stroke="#0E1526" stroke-width="5"/>'
    +'<line x1="'+mkI[0].toFixed(1)+'" y1="'+mkI[1].toFixed(1)+'" x2="'+mkO[0].toFixed(1)+'" y2="'+mkO[1].toFixed(1)+'" stroke="'+b.color+'" stroke-width="2.5"/>'
    +'<circle cx="'+mk[0].toFixed(1)+'" cy="'+mk[1].toFixed(1)+'" r="7" fill="#0E1526" stroke="'+b.color+'" stroke-width="2.5"/>'
    +'<circle cx="'+mk[0].toFixed(1)+'" cy="'+mk[1].toFixed(1)+'" r="2.4" fill="'+b.color+'"/>'
    +'<text x="100" y="118" text-anchor="middle" font-family="Georgia,serif" font-size="66" fill="'+b.color+'" style="font-variant-numeric:tabular-nums">'+Math.round(s)+'</text>'
    +'<text x="100" y="146" text-anchor="middle" font-size="17" letter-spacing="4" fill="'+b.color+'">'+b.label+'</text>';
  document.getElementById("gauge").innerHTML=svg;
}

function span(cls,txt){var s=document.createElement("span");if(cls)s.className=cls;if(txt!=null)s.textContent=txt;return s;}
function render(){
  var d=DATA;
  drawGauge(d.score,d.band);
  // F&G (flipped bar; marker mirrored to 100 - value)
  var fgblock=document.getElementById("fgblock");
  if(d.fg&&isFinite(d.fg.value)){
    fgblock.style.display="";
    var fv=document.getElementById("fgval");
    fv.textContent=(Math.round(d.fg.value*10)/10)+(d.fg.rating?" · "+d.fg.rating:"");
    fv.style.color=FG_COLORS[d.fg.rating]||"#9AA3B5";
    document.getElementById("fgmk").style.left=(100-Math.max(0,Math.min(100,d.fg.value)))+"%";
  } else { fgblock.style.display="none"; }
  // mini stats — one compact line
  var box=document.getElementById("stats"); box.textContent="";
  function stat(k,v,c){ box.appendChild(span("k",k+" ")); var e=span(null,v); if(c)e.style.color=c; box.appendChild(e); }
  var first=true;
  if(isFinite(d.cape)){ stat("CAPE",Math.round(d.cape)+"",null); first=false; }
  if(isFinite(d.goldTtm)){ if(!first) box.appendChild(document.createTextNode(" · ")); stat("Gold",(d.goldTtm>0?"+":"")+Math.round(d.goldTtm)+"%","#7fbf94"); first=false; }
  if(isFinite(d.btcDd)){ if(!first) box.appendChild(document.createTextNode(" · ")); stat("BTC",Math.round(d.btcDd)+"%","#C0564A"); first=false; }
}
function rel(iso){var t=Date.parse(iso);if(!isFinite(t))return String(iso);
  var h=(Date.now()-t)/36e5;return h<1?"just now":h<48?Math.round(h)+"h ago":Math.round(h/24)+"d ago";}

/* ---- optional live fetch: the ONLY network call, to the gated API_BASE ---- */
var LIVE_READY=!ACT.live;
if(ACT.live){
  var ctrl=("AbortController" in window)?new AbortController():null;
  if(ctrl) setTimeout(function(){try{ctrl.abort();}catch(e){}},2600);
  var opt={headers:{accept:"application/json"},signal:ctrl&&ctrl.signal};
  Promise.all([
    fetch(API_BASE+"/api/v1/score",opt).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}),
    fetch(API_BASE+"/api/v1/dashboard/feed",opt).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;})
  ]).then(function(res){
    try{
      var sc=res[0]&&res[0].data, mx=(res[1]&&res[1].data&&res[1].data.metrics)||{}, fg=mx.fear_greed;
      if(sc){
        DATA={score:sc.headline_median,band:sc.action_band,
          fg:(fg&&fg.available&&isFinite(fg.value))?{value:fg.value,rating:fg.detail&&fg.detail.rating}:null,
          cape:(mx.cape&&mx.cape.available)?mx.cape.value:NaN,
          goldTtm:(mx.gold_ttm_pct&&mx.gold_ttm_pct.available)?mx.gold_ttm_pct.value:NaN,
          btcDd:(mx.btc_drawdown_pct&&mx.btc_drawdown_pct.available)?mx.btc_drawdown_pct.value:NaN,
          asOf:(res[0].meta&&res[0].meta.computed_at)||new Date().toISOString()};
        render();
      }
    }catch(e){__wweb2Log("map error "+e);}
    LIVE_READY=true;
  },function(){LIVE_READY=true;});
}
function __wweb2WaitMillisecondsToWidgetIsReady(currentDelayMs){
  return LIVE_READY ? 0 : (currentDelayMs < 3000 ? 400 : 0);
}

render();
</script>
</body>
</html>
