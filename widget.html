<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="content-type" content="text/html; charset=utf-8">
<!-- Lay out at the widget's own point size (168) so WidgetWeb does NOT scale the page down. -->
<meta name="viewport" content="width=168, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- JsWidget (WidgetWeb) mandatory title -->
<meta name="js-widget-title" content="AI Bubble Monitor">
<title>AI Bubble Monitor — JS-Widget</title>
<style type="text/css">
  :root{
    --bg:#0E1526; --text:#EDE8DC; --dim:#C7CBD6; --muted:#9AA3B5; --faint:#78829a;
    --gold:#E0B458; --line:rgba(237,232,220,0.09); --serif:Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg)}
  body{color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased}
  /* Fixed 168x168 box == small 1:1 widget, authored at that size (no downscaling). Dense, no radial
     whitespace: a horizontal REGIME zone bar (blue/gold/red, marker) with a big score+band, an F&G
     zone bar, then a full metric grid + freshness. Every number fits; content clipped to the box. */
  .wrap{position:relative;width:168px;height:168px;overflow:hidden;margin:0 auto;padding:10px 12px 8px;
    display:flex;flex-direction:column;gap:7px}
  .glow{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(80% 60% at 50% 0%,rgba(224,180,88,0.12),rgba(224,180,88,0.03) 55%,transparent 78%)}
  .row{position:relative;z-index:1}
  .head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:5px}
  .lab{font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}
  .score{font-family:var(--serif);font-size:30px;line-height:0.8;font-variant-numeric:tabular-nums}
  .score .band{font-size:12px;letter-spacing:0.12em;margin-left:5px}
  .fgval{font-family:var(--serif);font-size:15px;font-variant-numeric:tabular-nums}
  .bar{position:relative;height:9px;border-radius:999px}
  .bar.reg{background:linear-gradient(90deg,#5B8DEF 0 45%,#E0B458 45% 60%,#E05252 60% 100%);opacity:0.9}
  .bar.fg{background:linear-gradient(90deg,#5AA9A3,#7fbf94,#9AA3B5,#C0564A,#E05252)}  /* flipped */
  .mk{position:absolute;top:-3px;width:2.5px;height:15px;border-radius:2px;background:var(--text);
    box-shadow:0 0 0 2px var(--bg);transform:translateX(-50%)}
  .grid{display:grid;grid-template-columns:1fr 1fr;column-gap:10px;row-gap:3px;
    font-size:10.5px;line-height:1.2;color:var(--dim);font-variant-numeric:tabular-nums;position:relative;z-index:1;margin-top:1px}
  .grid .cell{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .grid .k{color:var(--muted)}
  .foot{font-size:8px;color:var(--faint);text-align:center;position:relative;z-index:1;
    font-variant-numeric:tabular-nums;margin-top:auto}
  .foot .badge{border:1px solid var(--line);border-radius:999px;padding:0 5px;text-transform:uppercase;letter-spacing:0.06em}
</style>
</head>
<body>
  <div class="wrap">
    <div class="glow"></div>
    <div class="row">
      <div class="head"><span class="lab">Regime</span>
        <span class="score" id="score">—</span></div>
      <div class="bar reg"><span class="mk" id="regmk"></span></div>
    </div>
    <div class="row" id="fgblock">
      <div class="head"><span class="lab">Fear &amp; Greed</span><span class="fgval" id="fgval">—</span></div>
      <div class="bar fg"><span class="mk" id="fgmk"></span></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="foot" id="foot"></div>
  </div>

<script type="text/javascript">
/* ============ WidgetWeb JS-Widget: AI Bubble Monitor (served from GitHub Pages) ============
   Self-contained, no external assets (30MB widget budget), STATELESS (no cookies / no local store).
   Authored at the widget's 168pt box (viewport width=168) so it is NOT scaled down. Dense horizontal
   layout: a REGIME zone bar (blue/gold/red) + big score+band, an F&G zone bar, and a full metric grid.
   Gated like the dashboard: ?status-api=<key> -> subdomain-of-host API base (KEY_RE-whitelisted). */

function __wweb2JsWidgetTitle(){ return "AI Bubble Monitor"; }
function __wweb2Log(m){ /* Developer-mode log hook */ }

/* ---- gating (mirrors src/bubblegauge.tsx resolveActivation) ---- */
const KEY_RE = /^[a-z0-9-]{1,32}$/;               // strict whitelist — no dots, no full URLs
var DEMO_KEYS = { demo: true, fixture: true };
function resolveBase(){
  var url; try { url = new URL(window.location.href); } catch (e) { return { live: false }; }
  var key = url.searchParams.get("status-api");
  if (!key || !KEY_RE.test(key)) return { live: false };        // no/invalid key -> sample
  if (DEMO_KEYS[key]) return { live: false, demo: true };       // offline preview
  var host = window.location.hostname, labels = host.split(".");
  var parent = labels.length > 2 ? labels.slice(1).join(".") : host;
  return { live: true, base: "https://" + key + "." + parent }; // subdomain-of-parent only
}
var ACT = resolveBase();
var API_BASE = ACT.base || null;
var DEMO = !!ACT.demo;

/* ---- tokens ---- */
var BAND={hold:{label:"HOLD",color:"#5B8DEF"},trim:{label:"TRIM",color:"#E0B458"},"de-risk":{label:"DE-RISK",color:"#E05252"}};
function bandOf(b){return BAND[b]||BAND.hold;}
var FG_COLORS={"extreme fear":"#E05252","fear":"#C0564A","neutral":"#9AA3B5","greed":"#7fbf94","extreme greed":"#5AA9A3"};
var GREEN="#7fbf94", RED="#C0564A";

var SAMPLE={score:40,band:"hold",iqr:[34,47],redFlags:0,spy:"IN",qqq:"IN",
  fg:{value:46,rating:"neutral"},cape:42.2,goldTtm:22.9,btcDd:-44,asOf:"sample"};
var DATA=SAMPLE;

function span(cls,txt){var s=document.createElement("span");if(cls)s.className=cls;if(txt!=null)s.textContent=txt;return s;}
function cell(k,v,c){var d=span("cell");d.appendChild(span("k",k+" "));var e=span(null,v);if(c)e.style.color=c;d.appendChild(e);return d;}
function clamp(x){return Math.max(0,Math.min(100,x));}
function render(){
  var d=DATA,b=bandOf(d.band);
  // regime: big score + band, marker on the zone bar
  var sc=document.getElementById("score"); sc.textContent="";
  sc.style.color=b.color;
  sc.appendChild(document.createTextNode(Math.round(d.score)));
  sc.appendChild(span("band",b.label));
  document.getElementById("regmk").style.left=clamp(d.score)+"%";
  // F&G (flipped bar; marker mirrored to 100 - value)
  var fgblock=document.getElementById("fgblock");
  if(d.fg&&isFinite(d.fg.value)){
    fgblock.style.display="";
    var fv=document.getElementById("fgval");
    fv.textContent=(Math.round(d.fg.value*10)/10)+(d.fg.rating?" · "+d.fg.rating:"");
    fv.style.color=FG_COLORS[d.fg.rating]||"#9AA3B5";
    document.getElementById("fgmk").style.left=(100-clamp(d.fg.value))+"%";
  } else { fgblock.style.display="none"; }
  // dense metric grid — every remaining number
  var g=document.getElementById("grid"); g.textContent="";
  if(isFinite(d.cape)) g.appendChild(cell("CAPE",Math.round(d.cape)+""));
  if(isFinite(d.goldTtm)) g.appendChild(cell("Gold",(d.goldTtm>0?"+":"")+Math.round(d.goldTtm)+"%",GREEN));
  if(isFinite(d.btcDd)) g.appendChild(cell("BTC",Math.round(d.btcDd)+"%",RED));
  if(d.iqr&&d.iqr.length===2) g.appendChild(cell("IQR",d.iqr[0]+"–"+d.iqr[1]));
  if(isFinite(d.redFlags)) g.appendChild(cell("Flags",d.redFlags+"/4",d.redFlags>0?"#E0B458":GREEN));
  if(d.spy&&d.qqq){ var tc=(d.spy==="IN"&&d.qqq==="IN")?GREEN:(d.spy==="OUT"&&d.qqq==="OUT")?RED:"#E0B458";
    g.appendChild(cell("Trend",d.spy+"·"+d.qqq,tc)); }
  // freshness / sample
  var foot=document.getElementById("foot"); foot.textContent="";
  if(d.asOf&&d.asOf!=="sample"){ foot.appendChild(document.createTextNode("updated "+rel(d.asOf))); }
  else { foot.appendChild(span("badge","sample")); foot.appendChild(document.createTextNode(" · heuristic, not advice")); }
}
function rel(iso){var t=Date.parse(iso);if(!isFinite(t))return String(iso);
  var h=(Date.now()-t)/36e5;return h<1?"just now":h<48?Math.round(h)+"h ago":Math.round(h/24)+"d ago";}

/* ---- optional live fetch: the ONLY network call, to the gated API_BASE ---- */
var LIVE_READY=!ACT.live;
if(ACT.live){
  var ctrl=("AbortController" in window)?new AbortController():null;
  if(ctrl) setTimeout(function(){try{ctrl.abort();}catch(e){}},2600);
  var opt={headers:{accept:"application/json"},signal:ctrl&&ctrl.signal};
  Promise.all([
    fetch(API_BASE+"/api/v1/score",opt).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}),
    fetch(API_BASE+"/api/v1/dashboard/feed",opt).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;})
  ]).then(function(res){
    try{
      var sc=res[0]&&res[0].data, mx=(res[1]&&res[1].data&&res[1].data.metrics)||{}, fg=mx.fear_greed, ts=sc&&sc.trend_states;
      if(sc){
        DATA={score:sc.headline_median,band:sc.action_band,iqr:sc.iqr||null,redFlags:sc.red_flag_count,
          spy:ts&&ts.SPY&&ts.SPY.faber_10mo, qqq:ts&&ts.QQQ&&ts.QQQ.faber_10mo,
          fg:(fg&&fg.available&&isFinite(fg.value))?{value:fg.value,rating:fg.detail&&fg.detail.rating}:null,
          cape:(mx.cape&&mx.cape.available)?mx.cape.value:NaN,
          goldTtm:(mx.gold_ttm_pct&&mx.gold_ttm_pct.available)?mx.gold_ttm_pct.value:NaN,
          btcDd:(mx.btc_drawdown_pct&&mx.btc_drawdown_pct.available)?mx.btc_drawdown_pct.value:NaN,
          asOf:(res[0].meta&&res[0].meta.computed_at)||new Date().toISOString()};
        render();
      }
    }catch(e){__wweb2Log("map error "+e);}
    LIVE_READY=true;
  },function(){LIVE_READY=true;});
}
function __wweb2WaitMillisecondsToWidgetIsReady(currentDelayMs){
  return LIVE_READY ? 0 : (currentDelayMs < 3000 ? 400 : 0);
}

render();
</script>
</body>
</html>
